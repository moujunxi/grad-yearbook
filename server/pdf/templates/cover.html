<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "Microsoft YaHei","PingFang SC",sans-serif; }
  .page { width:210mm; height:297mm; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; page-break-after:always; }
  h1 { font-size:48px; margin-bottom:16px; }
  .sub { font-size:20px; opacity:.85; margin-bottom:8px; }
  .count { font-size:16px; opacity:.7; margin-top:24px; }
  .deco { width:120px; height:2px; background:#fff; margin:24px 0; opacity:.5; }
</style></head><body>
<div class="page">
  <h1>{{TITLE}}</h1>
  <div class="deco"></div>
  <p class="sub">{{DATE}}</p>
  <p class="count">共 {{COUNT}} 位同学</p>
</div>
</body></html>
