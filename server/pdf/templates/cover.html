<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "Noto Sans CJK SC","Microsoft YaHei","PingFang SC",sans-serif; }
  .page { width:210mm; height:297mm; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom:60px; color:#1e293b; page-break-after:always; position:relative; overflow:hidden; }
  .bg { position:absolute; inset:0; background-size:cover; background-position:center; }
  .card { position:relative; z-index:1; text-align:center; padding:24px 48px; background:rgba(255,255,255,.85); border-radius:16px; backdrop-filter:blur(8px); box-shadow:0 4px 24px rgba(0,0,0,.08); }
  h1 { font-size:36px; font-weight:700; letter-spacing:2px; color:#1e293b; margin-bottom:8px; }
  .deco { width:50px; height:3px; background:linear-gradient(90deg,#6366f1,#8b5cf6); border-radius:2px; margin:12px auto; }
  .sub { font-size:17px; color:#64748b; margin-bottom:4px; }
  .count { font-size:14px; color:#94a3b8; margin-top:10px; }
</style></head><body>
<div class="page">
  <div class="bg" style="background-image:url('{{COVER_BG}}')"></div>
  <div class="card">
    <h1>🎓 同学录</h1>
    <div class="deco"></div>
    <p class="sub">{{DATE}}</p>
    <p class="count">共 {{COUNT}} 位同学</p>
  </div>
</div>
</body></html>
