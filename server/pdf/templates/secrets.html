<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "Noto Sans CJK SC","Microsoft YaHei","PingFang SC",sans-serif; }
  .page { width:210mm; min-height:297mm; padding:50px 60px; page-break-after:always; background:#f8fafc; position:relative; }
  .bg-dots { position:absolute; inset:0; background:radial-gradient(circle,#d1d5db 1px,transparent 1px); background-size:24px 24px; opacity:.5; }
  .content { position:relative; z-index:1; }
  h1 { font-size:28px; font-weight:700; margin-bottom:12px; text-align:center; color:#1e293b; }
  .deco { width:40px; height:3px; background:linear-gradient(90deg,#6366f1,#8b5cf6); border-radius:2px; margin:0 auto 36px; }
  .msg-block { background:#fff; border-radius:12px; padding:18px 20px; margin-bottom:14px; box-shadow:0 2px 10px rgba(0,0,0,.04); border-left:3px solid #6366f1; }
  .msg-block .from { font-size:13px; color:#6366f1; font-weight:600; margin-bottom:6px; }
  .msg-block .body { font-size:14px; color:#475569; line-height:1.7; }
  .empty { text-align:center; color:#94a3b8; font-size:15px; margin-top:60px; }
</style></head><body>
<div class="page">
  <div class="bg-dots"></div>
  <div class="content">
    <h1>💌 留言</h1>
    <div class="deco"></div>
    {{ROWS}}
  </div>
</div>
</body></html>
