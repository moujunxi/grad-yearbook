<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "Noto Sans CJK SC","Microsoft YaHei","PingFang SC",sans-serif; }
  .page { width:210mm; height:297mm; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px 60px; page-break-after:always; position:relative; overflow:hidden; }
  .bg { position:absolute; inset:0; background-size:cover; background-position:center; }
  .content { position:relative; z-index:1; }
  h1 { font-size:28px; font-weight:700; margin-bottom:36px; text-align:center; color:#1e293b; }
  .deco { width:40px; height:3px; background:linear-gradient(90deg,#6366f1,#8b5cf6); border-radius:2px; margin:0 auto 36px; }
  table { width:100%; max-width:480px; border-collapse:collapse; background:rgba(255,255,255,.75); border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.04); backdrop-filter:blur(6px); }
  tr { border-bottom:1px solid rgba(0,0,0,.05); }
  tr:last-child { border-bottom:none; }
  td { padding:14px 20px; font-size:15px; }
  td:first-child { color:#334155; font-weight:500; }
  td:last-child { color:#94a3b8; text-align:right; width:80px; font-variant-numeric:tabular-nums; }
</style></head><body>
<div class="page">
  <div class="bg" style="background-image:url('{{TOC_BG}}')"></div>
  <div class="content">
    <h1>📋 目 录</h1>
    <div class="deco"></div>
    <table>{{ROWS}}</table>
  </div>
</div>
</body></html>
